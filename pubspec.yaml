name: flutter_smart_turn
description: >
  A Flutter/Dart turn-taking router for real-time voice apps.
  Separates "what to say" from "when to say it".
version: 0.1.0
homepage: https://github.com/user/flutter_smart_turn
repository: https://github.com/user/flutter_smart_turn
issue_tracker: https://github.com/user/flutter_smart_turn/issues

environment:
  sdk: ^3.11.3
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  equatable: ^2.0.8
  flutter_onnxruntime: ^1.6.3
  http: ^1.6.0
  web_socket_channel: ^3.0.3
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
